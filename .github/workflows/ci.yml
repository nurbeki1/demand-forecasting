name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # Backend tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ./back
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Create test environment
        working-directory: ./back
        run: |
          echo "JWT_SECRET_KEY=test_secret_key_for_ci_at_least_32_characters_long" > .env
          echo "OPENAI_API_KEY=sk-test-key" >> .env

      - name: Run tests with coverage
        working-directory: ./back
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --cov-fail-under=50 -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./back/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # Frontend lint and build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend-chat/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-chat
        run: npm ci

      - name: Lint
        working-directory: ./frontend-chat
        run: npm run lint || true

      - name: Build
        working-directory: ./frontend-chat
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com

  # E2E tests (optional - runs only if playwright is installed)
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: false  # Disabled until Playwright is set up

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend-chat
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./frontend-chat
        run: npx playwright test

  # Docker build (optional)
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: false
          tags: demand-forecasting-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Run security scan
        working-directory: ./back
        run: safety check -r requirements.txt || true
