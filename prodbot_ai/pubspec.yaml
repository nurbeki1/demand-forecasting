name: prodbot_ai
description: ProdBot AI - Demand Forecasting Application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Charts
  fl_chart: ^0.69.0

  # Network
  dio: ^5.4.0
  cached_network_image: ^3.3.1

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Routing (using custom router, go_router removed)

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5

  # Loading & Animations
  shimmer: ^3.0.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.6.3
  build_runner: ^2.13.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
